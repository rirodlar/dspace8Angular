<div [class]="field.styleValue">
    <span *ngIf="!isHtml && !isLink" class="text-value" [innerHTML]="formatText(metadataValue.value)"></span>
    <span *ngIf="isHtml || isLink" class="text-value">
        <a href="{{metadataValue.value}}" target="_blank">{{metadataValue.value}}</a>
    </span>
</div>
